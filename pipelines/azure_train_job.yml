$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
code: ../src/training/
command: >-
  python train.py 
  --input_data ${{inputs.training_data}}
inputs:
  training_data: 
    type: uri_file
    path: azureml:churn-dataset@latest
environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04:latest
  conda_file: ../src/serving/conda.yml
compute: azureml:churn-cluster
display_name: customer-churn-training-job
experiment_name: churn-prediction-experiment
